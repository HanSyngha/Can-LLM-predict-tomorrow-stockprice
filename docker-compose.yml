services:
  app:
    build: .
    ports:
      - "4001:4001"
    volumes:
      - ./data:/app/data
      - chrome-profile:/tmp/chrome-profile
    environment:
      - TZ=Asia/Seoul
      - PORT=4001
      - NODE_ENV=production
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  chrome-profile:
